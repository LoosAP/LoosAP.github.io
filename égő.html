<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>lightbubl</title>
        <style type="text/css">
            body{
                height: 100vh;
                background-color: black;
                display: grid;
                place-items: center;
            }
            div{
                width: 300px;
                height: 300px;

                background: lightgrey;
                border-radius: 50%;
            }
            div#cyan:hover{
                background: red;
                box-shadow: 0px 0px 5px red,
                        0px 0px 25px red,
                        0px 0px 50px red,
                        0px 0px 100px red;
            }
            div#yellow:hover{
                background: yellow;
                box-shadow: 0px 0px 5px yellowgreen,
                        0px 0px 25px yellowgreen,
                        0px 0px 50px yellowgreen,
                        0px 0px 100px yellowgreen;
            }
            div#green:hover{
                background: greenyellow;
                box-shadow: 0px 0px 5px greenyellow,
                        0px 0px 25px greenyellow,
                        0px 0px 50px greenyellow,
                        0px 0px 100px yellowgreen;
            }
        </style>
    </head>
    <body>
        <div id="green"></div>
        <div id="yellow"></div>
        <div id="cyan">

        </div>
    </body>
</html>
